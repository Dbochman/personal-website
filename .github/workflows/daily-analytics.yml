name: Daily Analytics Collection

on:
  workflow_dispatch:
    inputs:
      include_lighthouse:
        description: 'Run Lighthouse audit (normally weekly only)'
        required: false
        type: boolean
        default: false
  schedule:
    # GA4 and Search Console run Mon-Sat at 6 AM UTC
    - cron: '0 6 * * 1-6'
    # Full run with Lighthouse on Sundays at 6 AM UTC (a11y/SEO focus)
    - cron: '0 6 * * 0'

jobs:
  lighthouse:
    # Run weekly on Sundays, or on manual dispatch with include_lighthouse=true
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.include_lighthouse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse on production (multi-page)
        id: lighthouse_audit
        continue-on-error: true
        run: node scripts/lighthouse-multi-page.mjs

      - name: Save Lighthouse reports
        if: always()
        run: |
          test -f lighthouse-reports/summary.json
          mkdir -p docs/metrics
          cp lighthouse-reports/summary.json docs/metrics/latest-multi-page.json
          echo "{\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"commit\": \"${{ github.sha }}\", \"trigger\": \"${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}\"}" > docs/metrics/last-run.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 7

      - name: Preserve Lighthouse audit result
        if: steps.lighthouse_audit.outcome == 'failure'
        run: exit 1

    outputs:
      completed: ${{ job.status == 'success' }}

  github-billing:
    # Run weekly on Sundays alongside Lighthouse
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.include_lighthouse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Fetch GitHub billing data
        env:
          GH_BILLING_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: node scripts/fetch-github-billing.js

      - name: Upload billing data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-billing-data
          path: docs/metrics/github-billing-history.json
          retention-days: 7

  search-console:
    # Run daily - no dependency on lighthouse (which is weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Search Console data
        env:
          SEARCH_CONSOLE_CREDENTIALS: ${{ secrets.SEARCH_CONSOLE_CREDENTIALS }}
        run: node scripts/fetch-search-console-data.js

      - name: Upload search data
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: search-console-data
          path: docs/metrics/search-console-history.json
          retention-days: 7
          if-no-files-found: error

  ga4:
    # Run daily - independent from Search Console so one integration failure
    # doesn't block the rest of analytics collection.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GA4 analytics data
        env:
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node scripts/fetch-ga4-data.js

      - name: Upload GA4 data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ga4-data
          path: docs/metrics/ga4-history.json
          retention-days: 7

  commit-all:
    # Wait for data collection jobs; lighthouse and github-billing are optional (weekly only)
    needs: [lighthouse, search-console, ga4, github-billing]
    if: always() && (needs.search-console.result == 'success' || needs.ga4.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # A PAT is required here because pushes made with GITHUB_TOKEN do not
          # trigger the push-based deployment workflow.
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
        continue-on-error: true

      - name: Merge artifacts into docs/metrics
        run: |
          mkdir -p docs/metrics

          # Copy Lighthouse data (only available on weekly runs)
          if [ -f artifacts/lighthouse-reports/summary.json ]; then
            cp artifacts/lighthouse-reports/summary.json docs/metrics/latest-multi-page.json
            echo "✅ Lighthouse data updated (weekly run)"
          else
            echo "ℹ️  No Lighthouse data this run (weekly only)"
          fi

          # Copy Search Console data
          if [ -f artifacts/search-console-data/search-console-history.json ]; then
            cp artifacts/search-console-data/search-console-history.json docs/metrics/
            echo "✅ Search Console data updated"
          fi

          # Copy GA4 data
          if [ -f artifacts/ga4-data/ga4-history.json ]; then
            cp artifacts/ga4-data/ga4-history.json docs/metrics/
            echo "✅ GA4 data updated"
          fi

          # Copy GitHub billing data (only available on weekly runs)
          if [ -f artifacts/github-billing-data/github-billing-history.json ]; then
            cp artifacts/github-billing-data/github-billing-history.json docs/metrics/
            echo "✅ GitHub billing data updated (weekly run)"
          else
            echo "ℹ️  No GitHub billing data this run (weekly only)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate latest.json
        env:
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SEARCH_CONSOLE_CREDENTIALS: ${{ secrets.SEARCH_CONSOLE_CREDENTIALS }}
        run: |
          # Re-run GA4 script to regenerate latest.json with GA4/RUM data.
          node scripts/fetch-ga4-data.js
          # Restore Search Console summary from the freshly merged history artifact.
          node scripts/fetch-search-console-data.js --update-summary-only

      - name: Commit all metrics
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/metrics/
          git diff --staged --quiet || git commit -m "chore: daily analytics update [skip-changelog]"
          git push

      - name: Check for anomalies
        id: anomaly_check
        run: |
          node -e "
          const fs = require('fs');
          const failures = [];
          let checksComplete = true;
          const runDate = new Date().toISOString().split('T')[0];
          const isObject = value => value !== null && typeof value === 'object';
          const isGA4History = data => {
            if (!Array.isArray(data) || data.length === 0) return false;
            const latest = data[data.length - 1];
            return isObject(latest) &&
              typeof latest.timestamp === 'string' &&
              typeof latest.date === 'string' &&
              (latest.sessionAnomaly === undefined || isObject(latest.sessionAnomaly));
          };
          const isSearchHistory = data => {
            if (!Array.isArray(data) || data.length < 2) return false;
            return data.slice(-2).every(entry =>
              isObject(entry) &&
              isObject(entry.summary) &&
              Number.isFinite(entry.summary.averagePosition)
            );
          };
          const isLighthouseSummary = data => Array.isArray(data) &&
            data.length > 0 &&
            data.every(page =>
              isObject(page) &&
              typeof page.page === 'string' &&
              Number.isFinite(page.performance) &&
              Number.isFinite(page.accessibility) &&
              (page.collectedAt === undefined || typeof page.collectedAt === 'string')
            );
          const readMonitoringJson = (file, signal, validate) => {
            if (!fs.existsSync(file)) {
              checksComplete = false;
              failures.push(\`\${signal}: monitoring data is missing\`);
              return null;
            }
            try {
              const parsed = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!validate(parsed)) {
                checksComplete = false;
                failures.push(\`\${signal}: monitoring data has an invalid schema\`);
                return null;
              }
              return parsed;
            } catch (error) {
              checksComplete = false;
              failures.push(\`\${signal}: monitoring data could not be parsed\`);
              console.error(\`\${signal} parse failure: \${error.message}\`);
              return null;
            }
          };

          // GA4 detection is computed from finalized daily totals by the fetch
          // script. Avoid recomputing it from overlapping rolling snapshots.
          const ga4File = 'docs/metrics/ga4-history.json';
          const ga4History = readMonitoringJson(ga4File, 'GA4', isGA4History);
          if (ga4History) {
            const history = ga4History;
            if (history.length > 0) {
              const latest = history[history.length - 1];
              const collectedAt = Date.parse(latest.timestamp);
              const collectionAgeMs = Date.now() - collectedAt;
              const isFreshCollection = latest.date === runDate &&
                Number.isFinite(collectedAt) &&
                collectionAgeMs >= 0 &&
                collectionAgeMs <= 2 * 60 * 60 * 1000;
              const ga4CheckComplete = isFreshCollection &&
                latest.sessionAnomaly?.confidence === 'high' &&
                ['normal', 'anomaly'].includes(latest.sessionAnomaly?.status);
              if (!ga4CheckComplete) {
                checksComplete = false;
                failures.push('GA4: recovery state is stale or incomplete');
              } else if (latest.sessionAnomaly.isAnomaly) {
                failures.push(\`GA4: \${latest.sessionAnomaly.message}\`);
              }
            } else {
              checksComplete = false;
            }
          }

          // Check Search Console data
          const scFile = 'docs/metrics/search-console-history.json';
          const searchHistory = readMonitoringJson(scFile, 'Search Console', isSearchHistory);
          if (searchHistory) {
            const history = searchHistory;
            if (history.length >= 2) {
              const latest = history[history.length - 1];
              const previous = history[history.length - 2];
              const collectedAt = Date.parse(latest.collectedAt);
              const collectionAgeMs = Date.now() - collectedAt;
              const searchCheckComplete = latest.dataState === 'final' &&
                Number.isFinite(collectedAt) &&
                collectionAgeMs >= 0 &&
                collectionAgeMs <= 2 * 60 * 60 * 1000;
              if (!searchCheckComplete) {
                checksComplete = false;
                failures.push('Search Console: recovery state is stale or incomplete');
              } else {
                const positionChange = latest.summary.averagePosition - previous.summary.averagePosition;
                if (positionChange > 5) {
                  failures.push(\`Search Console: Position worsened by \${Math.round(positionChange * 10) / 10}\`);
                }
              }
            } else {
              checksComplete = false;
            }
          }

          // Check Lighthouse data
          const lhFile = 'docs/metrics/latest-multi-page.json';
          const lighthouseSummary = readMonitoringJson(lhFile, 'Lighthouse', isLighthouseSummary);
          if (lighthouseSummary) {
            const summary = lighthouseSummary;
            const firstPage = Array.isArray(summary) ? summary[0] : undefined;
            const collectedAt = Date.parse(firstPage?.collectedAt);
            const collectionAgeMs = Date.now() - collectedAt;
            const lighthouseCheckComplete = Array.isArray(summary) &&
              summary.length > 0 &&
              Number.isFinite(collectedAt) &&
              collectionAgeMs >= 0 &&
              collectionAgeMs <= 8 * 24 * 60 * 60 * 1000 &&
              summary.every(page =>
                page.collectedAt === firstPage.collectedAt &&
                Number.isFinite(page.performance) &&
                Number.isFinite(page.accessibility)
              );
            if (!lighthouseCheckComplete) {
              checksComplete = false;
              failures.push('Lighthouse: recovery state is stale or incomplete');
            } else {
              summary.forEach(page => {
                if (page.performance < 50) {
                  failures.push(\`Lighthouse: \${page.page} performance at \${page.performance}\`);
                }
                if (page.accessibility < 90) {
                  failures.push(\`Lighthouse: \${page.page} accessibility at \${page.accessibility}\`);
                }
              });
            }
          }

          if (failures.length > 0) {
            console.log('Anomalies detected:');
            failures.forEach(f => console.log(\`  - \${f}\`));
            // Write failures to file for issue creation
            fs.writeFileSync('/tmp/anomalies.json', JSON.stringify(failures));
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_anomalies=true\\n');
          } else {
            console.log('✅ No anomalies detected');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_anomalies=false\\n');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, \`checks_complete=\${checksComplete}\\n\`);
          "

      - name: Create issue for anomalies
        if: steps.anomaly_check.outputs.has_anomalies == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];

            let anomalies = [];
            try {
              anomalies = JSON.parse(fs.readFileSync('/tmp/anomalies.json', 'utf8'));
            } catch (e) {
              anomalies = ['Unknown anomaly - check workflow logs'];
            }

            // Keep one issue per active incident. Recovery closes it, so any
            // remaining open generated issue represents the current incident.
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'analytics,automated',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 100
            });
            const activeIncident = openIssues.find(issue =>
              !issue.pull_request &&
              issue.title.startsWith('🚨 Analytics Anomaly Detected')
            );

            if (activeIncident) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: activeIncident.number,
                body: `### Update (${date})\n${anomalies.map(a => '- ' + a).join('\n')}\n\n[Workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
              });
              core.info(`Updated active analytics incident #${activeIncident.number}`);
              return;
            }

            const body = [
              '## 📉 Daily Analytics Anomaly Alert',
              '',
              `**Date:** ${date}`,
              '',
              '### Detected Issues',
              ...anomalies.map(a => `- ${a}`),
              '',
              '### Actions Required',
              `1. Review the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              '2. Check individual data artifacts for details',
              '3. Investigate root causes',
              '',
              '---',
              '*This issue was automatically created by the Daily Analytics Collection workflow.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Analytics Anomaly Detected (${date})`,
              body: body,
              labels: ['analytics', 'automated']
            });

      - name: Close recovered analytics issues
        if: steps.anomaly_check.outputs.has_anomalies == 'false' && steps.anomaly_check.outputs.checks_complete == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'analytics,automated',
              state: 'open',
              per_page: 100
            });
            const recovered = openIssues.filter(issue =>
              !issue.pull_request &&
              issue.title.startsWith('🚨 Analytics Anomaly Detected')
            );

            for (const issue of recovered) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Recovered: the [latest analytics check](${runUrl}) passed without anomalies.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

            core.info(`Closed ${recovered.length} recovered analytics issue(s)`);
