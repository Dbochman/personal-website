name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel in-progress runs when new commits are pushed OR when PR is closed/merged
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    # Skip if PR is closed - concurrency will cancel in-progress runs
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache MDX compilation
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache/mdx
          key: mdx-${{ hashFiles('package-lock.json', 'scripts/precompile-mdx.ts', 'src/content/blog/schema.ts', 'content/blog/**/*.txt') }}
          restore-keys: |
            mdx-

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true  # Don't block PRs on advisories; report only

      # Playwright runs the runner's preinstalled Chrome (channel: 'chrome' in
      # playwright.config.ts and scripts/prerender.mjs when CI=true) — browser
      # downloads from Playwright's CDN hung indefinitely on 2026-06-10.
      - name: Verify system Chrome
        run: google-chrome --version

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Smoke tests
        run: BASE_URL=http://localhost:4173 npx playwright test --grep @smoke

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
