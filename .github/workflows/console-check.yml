name: Console Error Check

on:
  # Run after successful deployment
  workflow_run:
    workflows: ["Build, Test, and Deploy"]
    types:
      - completed

  # Allow manual triggering
  workflow_dispatch:

concurrency:
  group: production-browser-check
  cancel-in-progress: true

jobs:
  console-check:
    # Only run if the deploy workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Test the source that produced the completed deployment. Without an
          # explicit ref, a newer commit on main can be checked out while its
          # deployment is still in flight, making dynamic route tests race prod.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Playwright runs the runner's preinstalled Chrome (channel: 'chrome' in
      # playwright.config.ts when CI=true) — browser downloads from Playwright's
      # CDN hung indefinitely on 2026-06-10.
      - name: Verify system Chrome
        run: google-chrome --version

      - name: Wait for the triggering deployment
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "Polling for deployed sha ${EXPECTED_SHA}..."
          for i in {1..20}; do
            live_sha=$(curl -fsS \
              -H 'cache-control: no-cache' \
              "https://dylanbochman.com/build-info.json?check=${EXPECTED_SHA}" \
              | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).sha" \
              2>/dev/null || true)
            if [ "$live_sha" = "$EXPECTED_SHA" ]; then
              echo "Production matches ${EXPECTED_SHA} after $((i * 5)) seconds"
              exit 0
            fi
            echo "Attempt $i: live sha ${live_sha:-unavailable}; waiting 5 seconds..."
            sleep 5
          done
          echo "Production did not serve ${EXPECTED_SHA} within 100 seconds"
          exit 1

      - name: Run console error checks on production
        env:
          BASE_URL: https://dylanbochman.com
        # Only run console-errors and smoke tests (exclude visual regression and 404 tests)
        # Visual regression has its own workflow; 404 test pollutes GA4 analytics
        run: npx playwright test tests/e2e/console-errors.spec.ts --grep "@smoke"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: console-check-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Create or update browser check issue
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = `## 🚨 Production Browser Check Failed

            The automated production browser check failed. This can indicate a
            console error, a smoke-test regression, or a workflow/setup problem.

            ### Details

            - **Date**: ${date}
            - **Site**: https://dylanbochman.com
            - **Workflow Run**: [View Details](${runUrl})

            ### What to do

            1. Review the [test results](${runUrl}) for specific error messages
            2. Check the artifacts for detailed logs
            3. Reproduce locally by running: \`npm run test:e2e\`
            4. Fix the errors and redeploy

            ### Test Report

            Download the full test report from the workflow artifacts to see:
            - Console error messages
            - The failed smoke assertion
            - Screenshots and traces, when available

            ---

            **Automated check run**: ${{ github.run_id }}
            `;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated',
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(issue =>
              !issue.pull_request &&
              (issue.title.startsWith('🚨 Production Browser Check Failed') ||
                issue.title.startsWith('🚨 Console Errors Detected'))
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `### Repeated failure (${date})\n\n[View workflow run](${runUrl}).`
              });
              core.info(`Updated active browser-check issue #${existing.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Browser Check Failed (${date})`,
              body: body,
              labels: ['bug', 'automated']
            });

      - name: Close recovered browser check issues
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated',
              state: 'open',
              per_page: 100
            });
            const recovered = openIssues.filter(issue =>
              !issue.pull_request &&
              (issue.title.startsWith('🚨 Production Browser Check Failed') ||
                issue.title.startsWith('🚨 Console Errors Detected'))
            );

            for (const issue of recovered) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Recovered: the [latest production browser check](${runUrl}) passed.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

            core.info(`Closed ${recovered.length} recovered browser-check issue(s)`);

      - name: Post success summary
        if: success()
        run: |
          echo "## ✅ Production Browser Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No critical console errors or smoke-test failures were detected on the production site." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Checked:**" >> $GITHUB_STEP_SUMMARY
          echo "- Home page (https://dylanbochman.com)" >> $GITHUB_STEP_SUMMARY
          echo "- Blog list and newest deployed blog post" >> $GITHUB_STEP_SUMMARY
          echo "- Runbook page (https://dylanbochman.com/runbook)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
